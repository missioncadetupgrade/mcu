<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Faculty Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#f5f5f5;
  --text:#0f0f0f;
  --border:#ddd;
  --accent:#ff0000;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', Arial, sans-serif;}

body{
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== TOP NAV ===== */
.top-nav{
  height:60px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.brand{
  font-size:20px;
  font-weight:700;
}

.brand #army{ color:#ff0000; }
.brand #navy{ color:#0000ff; }
.brand #air{ color:#00b6ff; }

.reload-btn{
  background:none;
  border:none;
  font-size:20px;
  color:var(--accent);
  cursor:pointer;
}

/* ===== MAIN CONTENT ===== */
.page-content{
  margin-top:60px; /* below top nav */
  flex:1;
  display:flex;
  justify-content:center;
  padding:20px;
  overflow:auto;
}

.content-wrapper{
  width:100%;
  max-width:1000px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header h1{
  font-size:24px;
  font-weight:700;
}

.action-btn{
  background:var(--accent);
  border:none;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  font-size:14px;
  cursor:pointer;
}

/* CARD STYLE */
.table-row{
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

.cell{
  flex:1 1 200px;
  margin-bottom:10px;
}

.cell-title{
  font-size:12px;
  color:#606060;
}

.cell-value{
  font-size:14px;
  margin-top:3px;
}

.row-actions{
  display:flex;
  gap:10px;
}

.action-btn.delete-btn{
  background:#ff3333;
}

/* DRAWER */
.drawer{
  position:fixed;
  top:0;
  right:-400px;
  width:400px;
  max-width:90%;
  height:100vh;
  background:#fff;
  border-left:1px solid var(--border);
  padding:20px;
  transition:.3s;
  z-index:2000;
  overflow-y:auto;
}

.drawer.open{ right:0; }

.drawer h2{
  font-size:20px;
  margin-bottom:15px;
  color:var(--accent);
}

.drawer label{
  font-size:12px;
  color:#606060;
}

.drawer input,
.drawer select{
  width:100%;
  padding:10px;
  margin:5px 0 15px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:14px;
}

.drawer-actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.save{
  flex:1;
  background:var(--accent);
  border:none;
  padding:12px;
  border-radius:20px;
  color:#fff;
  cursor:pointer;
}

.cancel{
  flex:1;
  background:#eeeeee;
  border:none;
  padding:12px;
  border-radius:20px;
  cursor:pointer;
}

/* BOTTOM NAV - optional for desktop, hide on large screens */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 -2px 5px rgba(0,0,0,0.05);
}

.bottom-nav a{
  text-decoration:none;
  color:#606060;
  font-size:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bottom-nav a i{
  font-size:18px;
  margin-bottom:3px;
}

.bottom-nav a.active{
  color:var(--accent);
}

/* ===== MEDIA QUERIES ===== */

</style>
</head>
<body>

<!-- TOP NAV -->
<div class="top-nav">
  <div class="brand">
    <span id="army">Mission </span>
    <span id="navy">Cadet </span>
    <span id="air">Upgrade </span>
  </div>
  <button class="reload-btn" onclick="reloadPage()">
    <i class="fas fa-rotate"></i>
  </button>
</div>

<!-- MAIN CONTENT -->
<div class="page-content">
  <div class="content-wrapper">
    <div class="header">
      <h1>Faculty Profile Management</h1>
      <button class="action-btn" onclick="openDrawerNew()">+ Add Faculty</button>
<!-- Admin list container -->
      
    </div>
    <div id="list"></div>
      <h1>Test Management</h1>
  <div id="admin-list" style="margin-top:30px;"></div>
  </div>
  
</div>
<!-- ADMIN DRAWER -->
<div class="drawer" id="admin-drawer">
  <h2 id="admin-drawer-title">Edit Test Management</h2>

  <label>Year</label>
  <input id="a_year">

  <label>Subject Code</label>
  <input id="a_subjectcode">

  <label>Subject Name</label>
  <input id="a_subjectname">

  <label>College Logo</label>
  <input id="a_collegelogo">

  <label>College Year</label>
  <input id="a_collegeyear">

  <label>Exam Month</label>
  <input id="a_exammonth">

  <label>Exam Year</label>
  <input id="a_examyear">

  <label>Total Marks</label>
  <input id="a_totalmark">

  <label>Purpose</label>
  <input id="a_purpose">

  <label>Exam Date</label>
  <input id="a_examdate">

  <div class="drawer-actions">
    <button class="save" onclick="saveAdmin()">Save</button>
    <button class="cancel" onclick="closeAdminDrawer()">Cancel</button>
  </div>
</div>
<!-- DRAWER -->
<div class="drawer" id="drawer">
  <h2 id="drawer-title">Edit Faculty</h2>

  <label>Name</label>
  <input id="d_name">

  <label>Role</label>
  <select id="d_role">
    <option>Admin</option>
    <option>Faculty</option>
  </select>

  <label>Email</label>
  <input id="d_email">

  <label>Password</label>
  <input id="d_password" type="password">

  <div class="drawer-actions">
    <button class="save" onclick="save()">Save</button>
    <button class="cancel" onclick="closeDrawer()">Cancel</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
   <a class="nav-item" href="../index.html">
      <i class="fas fa-home"></i>
      Home
    </a>
    <a class="nav-item" href="../Books.html">
      <i class="fas fa-book"></i>
      Books
    </a>
    <a class="nav-item" href="../Assignments.html">
      <i class="fas fa-clipboard"></i>
      Test
    </a>
    <a class="nav-item" href="../Faq.html">
      <i class="fas fa-question-circle"></i>
      FAQ
    </a>
  <a href="#" id="lg">
    <i class="fas fa-right-from-bracket"></i>
    Logout
  </a>
</div>

<script>
function reloadPage(){ location.reload(); }
</script>

<!-- SUPABASE SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseUrl = 'https://ncc.missioncadetupgrade.workers.dev';
const supabaseKey = 'sb_publishable_VA-TOQxa5NucY7L1hPStkg_3eAj42PM';
const supabase1 = supabase.createClient(supabaseUrl, supabaseKey);

let users = [];
let currentIndex = null;
let isNew = false;

async function fetchData() {
  const { data, error } = await supabase1
    .from('FacultyAuth')
    .select('*');
  if (error) return console.error(error);
  users = data;
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  users.forEach((u, i) => {
    list.innerHTML += `
      <div class="table-row">
        <div class="cell">
          <div class="cell-title">Name</div>
          <div class="cell-value">${u.Name}</div>
        </div>
        <div class="cell">
          <div class="cell-title">Role</div>
          <div class="cell-value">${u.Role}</div>
        </div>
        <div class="cell">
          <div class="cell-title">Email</div>
          <div class="cell-value">${u.Email}</div>
        </div>
        <div class="row-actions">
          <button class="action-btn" onclick="edit(${i})">Edit</button>
          <button class="action-btn delete-btn" onclick="del('${u.Email}')">Delete</button>
        </div>
      </div>
    `;
  });
}

function edit(i){
  currentIndex = i;
  isNew = false;
  const u = users[i];
  d_name.value = u.Name;
  d_role.value = u.Role;
  d_email.value = u.Email;
  d_password.value = u.Password;
  drawer.classList.add("open");
}

function openDrawerNew(){
  isNew = true;
  d_name.value = "";
  d_role.value = "Admin";
  d_email.value = "";
  d_password.value = "";
  drawer.classList.add("open");
}

async function save(){
  const payload = {
    Name: d_name.value,
    Role: d_role.value,
    Email: d_email.value,
    Password: d_password.value
  };

  if(isNew){
    await supabase1.from('FacultyAuth').insert([payload]);
  } else {
    await supabase1.from('FacultyAuth')
    .update(payload)
    .eq('id', users[currentIndex].id);
  }

  closeDrawer();
  fetchData();
}

async function del(a){
  if(!confirm("Are you sure you want to delete this faculty?")) return;
  await supabase1.from('FacultyAuth')
  .delete()
  .eq('Email', a);
  fetchData();
}

function closeDrawer(){ drawer.classList.remove("open"); }
fetchData();

document.getElementById('lg').addEventListener('click', function() {
    sessionStorage.clear();
    window.location.href = "index.html";
});
</script>
<script>
let admins = [];
let currentAdminIndex = null;
let isAdminNew = false;

// FETCH ADMIN DATA
async function fetchAdmin() {
  const { data, error } = await supabase1
    .from('Admin')
    .select('*');
  if (error) return console.error(error);
  admins = data;
  renderAdmin();
}

// RENDER ADMIN LIST
function renderAdmin() {
  const list = document.getElementById("admin-list");
  list.innerHTML = "";
  admins.forEach((u, i) => {
    list.innerHTML += `
      <div class="table-row">
        <div class="cell">
          <div class="cell-title">Year</div>
          <div class="cell-value">${u.year || ""}</div>
        </div>
        <div class="cell">
          <div class="cell-title">Subject Code</div>
          <div class="cell-value">${u.subjectcode || ""}</div>
        </div>
        <div class="cell">
          <div class="cell-title">Subject Name</div>
          <div class="cell-value">${u.subjectname || ""}</div>
        </div>
        <div class="cell">
          <div class="cell-title">Purpose</div>
          <div class="cell-value">${u.Purpose || ""}</div>
        </div>
        <div class="row-actions">
          <button class="action-btn" onclick="editAdmin(${i})">Edit</button>
          <button class="action-btn delete-btn" onclick="delAdmin(${u.id})">Delete</button>
        </div>
      </div>
    `;
  });
}

// EDIT ADMIN
function editAdmin(i){
  currentAdminIndex = i;
  isAdminNew = false;
  const u = admins[i];
  a_year.value = u.year;
  a_subjectcode.value = u.subjectcode;
  a_subjectname.value = u.subjectname;
  a_collegelogo.value = u.collegelogo;
  a_collegeyear.value = u.collegeyear;
  a_exammonth.value = u.exammonth;
  a_examyear.value = u.examyear;
  a_totalmark.value = u.TotalMark;
  a_purpose.value = u.Purpose;
  a_examdate.value = u.examdate;
  document.getElementById('admin-drawer').classList.add("open");
}

// OPEN NEW ADMIN
function openDrawerAdminNew(){
  isAdminNew = true;
  a_year.value = "";
  a_subjectcode.value = "";
  a_subjectname.value = "";
  a_collegelogo.value = "";
  a_collegeyear.value = "";
  a_exammonth.value = "";
  a_examyear.value = "";
  a_totalmark.value = "";
  a_purpose.value = "";
  a_examdate.value = "";
  document.getElementById('admin-drawer').classList.add("open");
}

// SAVE ADMIN
async function saveAdmin(){
  const payload = {
    year: a_year.value,
    subjectcode: a_subjectcode.value,
    subjectname: a_subjectname.value,
    collegelogo: a_collegelogo.value,
    collegeyear: a_collegeyear.value,
    exammonth: a_exammonth.value,
    examyear: a_examyear.value,
    TotalMark: a_totalmark.value,
    Purpose: a_purpose.value,
    examdate: a_examdate.value
  };

  if(isAdminNew){
    await supabase1.from('Admin').insert([payload]);
  } else {
    await supabase1.from('Admin')
      .update(payload)
      .eq('id', admins[currentAdminIndex].id);
  }

  closeAdminDrawer();
  fetchAdmin();
}

// DELETE ADMIN
async function delAdmin(id){
  if(!confirm("Are you sure you want to delete this record?")) return;
  await supabase1.from('Admin').delete().eq('id', id);
  fetchAdmin();
}

// CLOSE ADMIN DRAWER
function closeAdminDrawer(){ 
  document.getElementById('admin-drawer').classList.remove("open"); 
}

// INITIAL FETCH
fetchAdmin();
</script>
</body>
</html>
