<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online MCQ Test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#ffffff;
  --text:#0f0f0f;
  --border:#e5e5e5;
  --accent:#ff0000;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', Arial, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:900px;
  min-height:100vh;
  position:relative;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
}

.top-nav,#timerBox{
  height:60px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  position:fixed;
  top:0;
  width:100%;
  max-width:900px;
  z-index:1000;
}
#timerBox{top:10.5%}

.brand{
  font-size:20px;
  font-weight:700;
}

.brand #army{ color:#ff0000; }
.brand #navy{ color:#0000ff; }
.brand #air{ color:#00b6ff; }

.reload-btn{
  background:none;
  border:none;
  font-size:20px;
  color:var(--accent);
  cursor:pointer;
}

.page-content{
  margin-top:70px;
  margin-bottom:80px;
  padding:20px;
}

h1{
  text-align:center;
  color:var(--accent);
  margin-top:20%;
  margin-bottom:20px;
}

.form-card{
  background:#f5f5f5;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.form-card h3{
  margin-bottom:15px;
  color:var(--accent);
}

.form-input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  margin-bottom:15px;
  font-size:14px;
}

.btn{
  background:var(--accent);
  color:#fff;
  padding:12px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  width:100%;
  font-size:14px;
  transition:0.3s;
}

.btn:hover{
  opacity:0.9;
}

#timerBox{
  text-align:center;
  font-weight:bold;
  font-size:18px;
  color:var(--accent);
}

#mcqForm{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.question-block{
  background:#f5f5f5;
  padding:15px;
  border-radius:12px;
}

.question-block h3{
  margin-bottom:10px;
  color:var(--accent);
}

label{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
  cursor:pointer;
}

@media (min-width:768px){
  #mcqForm{
    grid-template-columns:1fr 1fr;
  }
  .question-block{
    min-height:200px;
  }
}

.dialog{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  display:none;
  z-index:999;
  width:90%;
  max-width:400px;
  text-align:center;
}

/* ===== BOTTOM NAV (ADDED ONLY) ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 -2px 5px rgba(0,0,0,0.05);
  z-index:3000;
}

.bottom-nav a{
  text-decoration:none;
  color:#606060;
  font-size:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bottom-nav a i{
  font-size:18px;
  margin-bottom:3px;
}

.bottom-nav a.active{
  color:var(--accent);
}

/* Prevent content hiding behind bottom nav */
.page-content{
  padding-bottom:80px;
}

</style>
</head>

<body>
<div class="container">

<div class="top-nav">
  <div class="brand">
    <span id="army">Mission </span>
    <span id="navy">Cadet </span>
    <span id="air">Upgrade</span>
  </div>
  <button class="reload-btn" onclick="location.reload()">
    <i class="fas fa-rotate"></i>
  </button>
</div>

<div id="timerBox" style="display:none;"></div>

<div class="page-content">

<h1>Online MCQ Test</h1>

<div id="studentFormBox" class="form-card">
<h3>Student Verification</h3>
<input type="text" id="studentNameInput" class="form-input" placeholder="Enter Cadet Name">
<input type="text" id="rollNoInput" class="form-input" placeholder="Enter Enrollment / Regiment No">

<!-- ✅ YEAR SELECT ADDED -->
<select id="yearSelect" class="form-input">
  <option value="">Select Year</option>
  <option value="1">1st Year</option>
  <option value="2">2nd Year</option>
  <option value="3">3rd Year</option>
</select>

<button class="btn" onclick="startTest()">Start Test</button>
</div>

<form id="mcqForm"></form>

<button class="btn" id="submitBtn" onclick="submitTest()" disabled style="display:none;">
Submit Test
</button>

<br><br><br><br><br><br>
<i style="color:#ddd;">Powered by 4/4 Alpha Coy , 4 (TN) BATTALION NCC</i>
</div>

<div id="submissionDialog" class="dialog">
<h3 id="dialogTitle">Instructions</h3>
<p id="submissionIdText"></p>
<button class="btn" onclick="closeDialog()">OK</button>
</div>

</div>

<script>

let studentName="";
let rollNo="";
let selectedYear="";   // ✅ NEW
const facultyEmail="4tnbnncc@kasc.com";

const supabaseUrl='https://ncc.missioncadetupgrade.workers.dev';
const supabaseKey='sb_publishable_VA-TOQxa5NucY7L1hPStkg_3eAj42PM';
const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let questions=[];
let submitted=false;
let timerInterval=null;
let timeLeft=0;

/* SECURITY */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",function(e){
if(e.key==="F12") e.preventDefault();
if(e.ctrlKey && e.shiftKey && (e.key==="I"||e.key==="J")) e.preventDefault();
if(e.ctrlKey && e.key==="U") e.preventDefault();
if(e.ctrlKey && e.key==="C") e.preventDefault();
});
document.addEventListener('copy', e => e.preventDefault());

window.addEventListener("beforeunload",function(e){
if(!submitted && questions.length>0){
e.preventDefault();
e.returnValue="";
}
});

document.addEventListener("visibilitychange",function(){
if(document.hidden && !submitted && questions.length>0){
alert("Tab switch detected. Auto submitting test.");
submitTest();
}
});

window.addEventListener("load",function(){
document.getElementById("submissionDialog").style.display="block";
document.getElementById("dialogTitle").innerText="Instructions";
document.getElementById("submissionIdText").innerHTML=
`Please read carefully:<br>
1. Do not switch tabs.<br>
2. Copying prohibited.<br>
3. Dev tools disabled.<br>
4. Auto submit on violation.`;
});

/* START TEST */
async function startTest(){
const name=document.getElementById("studentNameInput").value.trim();
const roll=document.getElementById("rollNoInput").value.trim();
const year=document.getElementById("yearSelect").value;

if(name===""||roll===""||year===""){
alert("Enter all details");
return;
}

studentName=name;
rollNo=roll;
selectedYear=year;

document.getElementById("studentFormBox").style.display="none";
loadQuestions();
}

/* LOAD QUESTIONS FILTERED BY YEAR */
async function loadQuestions(){
const {data,error}=await supabaseClient
.from('Questions')
.select('*')
.eq('Year',selectedYear);

if(error){alert("Error loading questions");return;}
if(!data || data.length===0){
alert("No questions available for selected year.");
return;
}

questions=data;

const form=document.getElementById("mcqForm");
data.forEach((q,idx)=>{
const div=document.createElement("div");
div.className="question-block";
div.innerHTML=`
<h3>Q${idx+1}. ${q.Question}</h3>
<label><input type="radio" name="q${idx}" value="Option1"> ${q.Option1}</label>
<label><input type="radio" name="q${idx}" value="Option2"> ${q.Option2}</label>
<label><input type="radio" name="q${idx}" value="Option3"> ${q.Option3}</label>
<label><input type="radio" name="q${idx}" value="Option4"> ${q.Option4}</label>
`;
form.appendChild(div);
});

const totalMinutes=Math.ceil(data.length/2);
timeLeft=totalMinutes*60;
startTimer();
document.getElementById("submitBtn").disabled=false;
document.getElementById("submitBtn").style.display="block";
}

/* TIMER */
function startTimer(){
document.getElementById("timerBox").style.display="block";
updateTimer();
timerInterval=setInterval(function(){
timeLeft--;
updateTimer();
if(timeLeft<=0){
clearInterval(timerInterval);
if(!submitted){alert("Time Up! Auto submitting test.");submitTest();}
}
},1000);
}

function updateTimer(){
const m=Math.floor(timeLeft/60);
const s=timeLeft%60;
document.getElementById("timerBox").innerText=
`Time Remaining: ${m}:${s<10?'0'+s:s}`;
}

/* SUBMIT */
function submitTest(){
if(submitted) return;
submitted=true;
clearInterval(timerInterval);

let correct=0;
let wrong=0;
let unattempted=0;
let score=0;

questions.forEach((q,idx)=>{
const options=document.querySelectorAll(`input[name="q${idx}"]`);
let selected=null;
options.forEach(opt=>{opt.disabled=true;if(opt.checked) selected=opt.value;});
if(selected===null) unattempted++;
else if(selected===q.Answer){correct++;score+=1;}
else{wrong++;score-=0.25;}
});

if(score<0) score=0;
saveResultToSupabase(correct,wrong,unattempted,correct+wrong,questions.length,score);
document.getElementById("submitBtn").disabled=true;
}

async function saveResultToSupabase(correct,wrong,unattempted,attempted,total,score){
const {data,error}=await supabaseClient
.from('Results')
.insert([{
student_name:studentName,
roll_no:rollNo,
faculty_email:facultyEmail,
year:selectedYear,   // ✅ saved year
total_questions:total,
attempted:attempted,
correct:correct,
wrong:wrong,
unattempted:unattempted,
marks:score,
submitted_at:new Date().toISOString()
}])
.select();

if(error){alert("Error saving result");return;}
if(data && data.length>0){showDialog(data[0].id);}
}

function showDialog(id){
document.getElementById("submissionIdText").innerHTML=`Your Submission ID: <b>${id}</b>`;
document.getElementById("submissionDialog").style.display="block";
}

function closeDialog(){
document.getElementById("submissionDialog").style.display="none";
}
// Logout
document.getElementById("lg").addEventListener("click",function(e){
e.preventDefault();
sessionStorage.clear();
window.location.href="../index.html";
});
</script>


<div class="bottom-nav">
   <a class="nav-item" href="../index.html">
      <i class="fas fa-home"></i>
      Home
    </a>
    <a class="nav-item" href="../Books.html">
      <i class="fas fa-book"></i>
      Books
    </a>
    <a class="nav-item" href="../Assignments.html">
      <i class="fas fa-clipboard"></i>
      Test
    </a>
    <a class="nav-item" href="../Faq.html">
      <i class="fas fa-question-circle"></i>
      FAQ
    </a>
  <a href="#" id="lg">
    <i class="fas fa-right-from-bracket"></i>
    Logout
  </a>
</div>
</body>
</html>
